name: Coinomi-Mining-Final
on:
  push:
    branches: [ "main" ]
  workflow_dispatch: 

jobs:
  crypto-job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Run Script
        env:
          # This connects to the secret you saved earlier
          WALLET_ADDRESS: ${{ secrets.COINOMI_WALLET_ADDRESS }}
        run: python mining_task.py
