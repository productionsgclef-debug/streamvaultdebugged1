<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="/manifest.json">
    <title>Streamvault Media</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #121212; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .vault-card { border: 2px solid #333; padding: 40px; border-radius: 24px; text-align: center; background: #1e1e1e; }
        .stream-icon { font-size: 60px; color: #E91E63; margin-bottom: 15px; }
        .upload-zone { border: 2px dashed #444; padding: 20px; margin-top: 20px; border-radius: 12px; color: #888; }
    </style>
</head>
<body>
    <div class="vault-card">
        <div class="stream-icon">🎥</div>
        <h1>Streamvault</h1>
        <p>Your secure, private media storage.</p>
        <div class="upload-zone">Drop files here to secure</div>
    </div>
</body>
</html>
